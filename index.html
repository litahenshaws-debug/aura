<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roll an Aura Incremental</title>
    <style>
        :root {
            --bg-dark: #1e1e1e;
            --bg-light: #2c2c2c;
            --text-light: #f0f0f0;
            --text-dark: #1e1e1e;
            --accent-blue: #007bff;
            --accent-green: #28a745;
            --border-color: #444;
            --color-common: #888;
            --color-uncommon: #2ECC71;
            --color-rare: #3498DB;
            --color-epic: #9B59B6;
            --color-legendary: #E67E22;
            --color-mythical: #E74C3C;
            --color-divine: #F1C40F;
            --color-cosmic: #1ABC9C;
            --color-void: #34495E;
            --color-eternal: #FF4500;
        }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-dark); color: var(--text-light); margin: 0; text-align: center; }
        .header { background-color: var(--bg-light); padding: 15px; border-bottom: 2px solid var(--border-color); }
        .status-bar { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 10px; padding: 15px; background-color: var(--bg-light); margin: 10px; border-radius: 12px; }
        .display-area { min-height: 120px; background-color: #111; border: 3px solid var(--border-color); margin: 15px auto; width: 90%; max-width: 400px; border-radius: 10px; display: flex; flex-direction: column; justify-content: center; }
        .roll-btn { background-color: var(--accent-green); padding: 15px; width: 80%; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; }
        .tabs-container { width: 95%; margin: 20px auto; background: var(--bg-light); border-radius: 12px; overflow: hidden; }
        .tab-buttons { display: flex; overflow-x: auto; background: #333; }
        .tab-button { padding: 12px; border: none; background: none; color: white; cursor: pointer; }
        .tab-button.active { background: var(--bg-light); color: var(--accent-blue); font-weight: bold; }
        .tab-content { padding: 20px; display: none; text-align: left; }
        .tab-content.active { display: block; }
        .save-file-btn { background: var(--accent-green); color: white; padding: 10px; width: 100%; border: none; border-radius: 5px; cursor: pointer; margin-bottom: 10px; }
        .load-file-label { background: var(--accent-blue); color: white; padding: 10px; display: block; text-align: center; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="header">
        <h1>✨ Roll an Aura Incremental ✨</h1>
        <p id="username-display">Player: ---</p>
    </div>

    <div class="status-bar">
        <p>💰 Money: <span id="money-display">0</span></p>
        <p>💎 Shards: <span id="shard-display">0</span></p>
        <p>⚡ Power: <span id="power-display">0</span></p>
    </div>

    <div class="display-area">
        <p id="aura-name">???</p>
        <p id="aura-rarity">Ready to Roll</p>
    </div>

    <button onclick="rollAura()" class="roll-btn">ROLL AURA</button>

    <div class="tabs-container">
        <div class="tab-buttons">
            <button class="tab-button active" onclick="openTab('inventory-tab', this)">Inventory</button>
            <button class="tab-button" onclick="openTab('settings-tab', this)">Settings</button>
        </div>

        <div id="inventory-tab" class="tab-content active">
            <h3>Your Inventory</h3>
            <div id="inventory-list"></div>
        </div>

        <div id="settings-tab" class="tab-content">
            <h3>Save/Load File</h3>
            <button onclick="exportSaveToFile()" class="save-file-btn">💾 DOWNLOAD SAVE (.txt)</button>
            
            <label for="file-upload" class="load-file-label">📂 UPLOAD SAVE (.txt)</label>
            <input type="file" id="file-upload" accept=".txt" style="display:none" onchange="importSaveFromFile(event)">
            
            <hr>
            <button onclick="resetGame()" style="background:red; color:white; border:none; padding:10px; width:100%;">RESET EVERYTHING</button>
        </div>
    </div>

    <script>
        // --- ALL YOUR ORIGINAL VARIABLES ---
        let money = parseInt(localStorage.getItem('aura_money')) || 500;
        let shards = parseInt(localStorage.getItem('aura_shards')) || 0;
        let power = parseInt(localStorage.getItem('aura_power')) || 0;
        let inventory = JSON.parse(localStorage.getItem('aura_inv')) || [];
        let collectedAuras = new Set(JSON.parse(localStorage.getItem('aura_collection')) || []);

        // --- THE ACTUAL FILE SAVE LOGIC ---
        function exportSaveToFile() {
            // This grabs EVERYTHING and puts it in the file
            const fullData = {
                money: money,
                shards: shards,
                power: power,
                inventory: inventory,
                collection: Array.from(collectedAuras),
                lastSave: Date.now()
            };

            const blob = new Blob([JSON.stringify(fullData)], { type: "text/plain" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = "Aura_Save_Data.txt";
            a.click();
            URL.revokeObjectURL(url);
        }

        function importSaveFromFile(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = JSON.parse(e.target.result);
                    
                    // Overwrite the variables with the file data
                    money = data.money;
                    shards = data.shards;
                    power = data.power;
                    inventory = data.inventory;
                    collectedAuras = new Set(data.collection);

                    // Save to browser memory so it stays after reload
                    saveToLocal();
                    
                    alert("Progress Loaded! Refreshing...");
                    window.location.reload();
                } catch (err) {
                    alert("Invalid Save File!");
                }
            };
            reader.readAsText(file);
        }

        // --- HELPER FUNCTIONS ---
        function saveToLocal() {
            localStorage.setItem('aura_money', money);
            localStorage.setItem('aura_shards', shards);
            localStorage.setItem('aura_power', power);
            localStorage.setItem('aura_inv', JSON.stringify(inventory));
            localStorage.setItem('aura_collection', JSON.stringify(Array.from(collectedAuras)));
        }

        function updateUI() {
            document.getElementById('money-display').innerText = money;
            document.getElementById('shard-display').innerText = shards;
            document.getElementById('power-display').innerText = power;
        }

        function openTab(tabId, btn) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-button').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            btn.classList.add('active');
        }

        function resetGame() {
            if(confirm("Delete everything?")) {
                localStorage.clear();
                window.location.reload();
            }
        }

        // --- YOUR ORIGINAL ROLL LOGIC (Placeholder) ---
        function rollAura() {
            // Your 1000+ lines of aura logic would go here
            console.log("Rolling...");
            money += 10;
            updateUI();
            saveToLocal();
        }

        // Initialize UI
        updateUI();
    </script>
</body>
</html>
